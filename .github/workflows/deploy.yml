name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - develop
      - feature/setup-cicd # เพิ่ม branch เข้ามาที่นี่
  pull_request:
    branches:
      - main
      - develop
      - feature/setup-cicd # เพิ่ม branch เข้ามาที่นี่ด้วย

jobs:
  svelte-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          
      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Run Tests and Generate Coverage
        run: yarn test:coverage

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 1

  sonarqube-analyze:
    needs: svelte-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Coverage Artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=myapp-frontend
            -Dsonar.sources=src
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/.svelte-kit/**,**/build/**

  build-docker:
    needs: sonarqube-analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. กำหนดค่าตัวแปรตาม Branch เพื่อใช้ส่งเข้า Docker Build
      - name: Set Build Arguments
        id: args
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "browser_api=${{ secrets.PROD_BROWSER_API }}" >> $GITHUB_OUTPUT
            echo "docker_api=${{ secrets.PROD_DOCKER_API }}" >> $GITHUB_OUTPUT
            echo "oauth_uri=${{ secrets.PROD_OAUTH_URI }}" >> $GITHUB_OUTPUT
          else
            # ค่าของ UAT หรือ feature branch
            echo "browser_api=${{ secrets.UAT_BROWSER_API }}" >> $GITHUB_OUTPUT
            echo "docker_api=${{ secrets.UAT_DOCKER_API }}" >> $GITHUB_OUTPUT
            echo "oauth_uri=${{ secrets.UAT_OAUTH_URI }}" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          target: production
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/myapp-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/myapp-frontend:latest

          build-args: |
            PUBLIC_BROWSER_API_BASE_URL=${{ steps.args.outputs.browser_api }}
            PUBLIC_DOCKER_API_BASE_URL=${{ steps.args.outputs.docker_api }}
            PUBLIC_OAUTH_URI=${{ steps.args.outputs.oauth_uri }}

  deploy:
    needs: build-docker
    runs-on: self-hosted
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set Environment
        run: |
          # เพิ่ม elif สำหรับเช็ค branch feature/setup-cicd
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "APP_HOST=frontend.k8s.dev" >> $GITHUB_ENV
            echo "K8S_NAMESPACE=production" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/feature/setup-cicd" ]]; then
            echo "APP_HOST=frontend-test.k8s.dev" >> $GITHUB_ENV
            echo "K8S_NAMESPACE=test" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "APP_HOST=frontend.uat.k8s.dev" >> $GITHUB_ENV
            echo "K8S_NAMESPACE=uat" >> $GITHUB_ENV
          fi

      - name: Deploy to Kubernetes
        run: |
          kubectl create namespace ${K8S_NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -
          
          kubectl apply -f k8s/ -n ${K8S_NAMESPACE}

          kubectl patch ingress myapp-ingress \
            -n ${K8S_NAMESPACE} \
            --type=json \
            -p='[{"op": "replace", "path": "/spec/rules/0/host", "value": "'"${APP_HOST}"'"}]'

          kubectl set image deployment/myapp \
            myapp=${{ secrets.DOCKERHUB_USERNAME }}/myapp-frontend:${{ github.sha }} \
            -n ${K8S_NAMESPACE}