name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25' # เปลี่ยนเป็นเวอร์ชัน Node ที่โปรเจกต์คุณใช้
          
      - name: Install Dependencies
        run: npm ci # หรือ npm install / yarn install / pnpm install

      - name: Run Tests and Generate Coverage
        run: npm run test:coverage

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=myapp-frontend
            -Dsonar.sources=src
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/.svelte-kit/**,**/build/**

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: production
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/myapp-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/myapp-frontend:latest
          build-args: |
            PUBLIC_BROWSER_API_BASE_URL=${{ secrets.PUBLIC_BROWSER_API_BASE_URL }}
            PUBLIC_DOCKER_API_BASE_URL=${{ secrets.PUBLIC_DOCKER_API_BASE_URL }}

  deploy:
    needs: build-docker
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set Environment
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "APP_HOST=frontend.k8s.dev" >> $GITHUB_ENV
            echo "K8S_NAMESPACE=production" >> $GITHUB_ENV
          else
            echo "APP_HOST=frontend-uat.k8s.dev" >> $GITHUB_ENV
            echo "K8S_NAMESPACE=uat" >> $GITHUB_ENV
          fi

      - name: Deploy to Kubernetes
        run: |
          kubectl create namespace ${K8S_NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -
          
          # สมมติว่าไฟล์ k8s รวมกันอยู่ในโฟลเดอร์ k8s/
          kubectl apply -f k8s/ -n ${K8S_NAMESPACE}

          kubectl patch ingress myapp-ingress \
            -n ${K8S_NAMESPACE} \
            --type=json \
            -p='[{"op": "replace", "path": "/spec/rules/0/host", "value": "'"${APP_HOST}"'"}]'

          kubectl set image deployment/myapp \
            myapp=${{ secrets.DOCKERHUB_USERNAME }}/myapp-frontend:${{ github.sha }} \
            -n ${K8S_NAMESPACE}